name: OliveYoung Korea ID Debug

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: collect ids debug
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python crawler/collect_product_ids_kr.py

      - name: show debug files
        run: |
          ls -R debug_output || true
          head -100 debug_output/kr_page_1.html || true
          head -100 debug_output/kr_page_2.html || true
          head -100 debug_output/kr_page_3.html || true
